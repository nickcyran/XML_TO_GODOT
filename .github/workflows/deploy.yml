name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Export with Godot
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"
          relative_project_path: ./
          relative_export_path: ./build/web
          cache: true

      # GitHub Pages doesn't allow custom response headers, so we inject a
      # service worker (coi-serviceworker) that sets the Cross-Origin-Isolation
      # headers Godot's web export requires for SharedArrayBuffer.
      - name: Inject coi-serviceworker
        run: |
          curl -sL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js \
            -o ./build/web/Web/coi-serviceworker.js
          find ./build/web/Web -name "index.html" -exec \
            sed -i 's|<head>|<head>\n\t<script src="coi-serviceworker.js"></script>|' {} \;

      # 404.html redirect keeps deep-links working on gh-pages.
      - name: Add 404 redirect
        run: |
          echo '<html><head><meta http-equiv="refresh" content="0;url=index.html"></head></html>' \
            > ./build/web/Web/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web/Web
          force_orphan: true
